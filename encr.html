<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }
    body{
        background-color: whitesmoke;
        color: white;
        font-family: sans-serif;
        font-size: 1.5em;
        height: 100vh;
    }
    textarea{
        height: 100px;
        padding: 8px;
        font-size: 1.1em;
    }
    button{
        width: 80px;
        height: 30px;
        font-size: 20px;
        font-weight: 900;
        margin: 10px;
    }
    p{
        width: 100px;
        text-align: center;
        background-color:rgba(0, 78, 180, 0.801);
        padding: 5px;
        border-radius: 3px;
    }
    .d1{
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 10px;
        height: 50vh;
    }
    .d1 div{
        width: 50%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .d1 div textarea{
        width: 95%;
        height: 100%;
        background-color:gainsboro;
    }
    .d2{
        margin: 0 auto;
        width: 65%;
        display: flex;
        justify-content: space-between;
    }
</style>
<div class="d1">
    <div>
        <p>الدخل</p>
        <textarea id="in1" cols="30" rows="10"></textarea>
    </div>

    <div>
        <p>الخرج</p>
        <textarea id="in2" cols="30" rows="10"></textarea>    
    </div>
</div>
<div class="d2">
    <button id="b1">تشفير</button>
    <button id="b2">فك التشفير</button>
</div>
<script>
    var in1 = document.getElementById("in1");
    var in2 = document.getElementById("in2");
    var b1 = document.getElementById("b1");
    var b2 = document.getElementById("b2");
    var arr0 = ["4","'","3","0","~","!","@","#","$","5","6","2","1","%",")","-","_",">","<","^","&","*","?","(","7","9","8"];
    var arr1 = [" ","a","b","c","d","e","f","g","h","i","j","k","l","m","n","o","p","q","r","s","t","u","v","w","x","y","z"];
    var arr2 = ["O","P","'","Q","R","S","T","U","V","W","X","Y","Z","A","B","C","D","E","F","G","H","I","J","K","L","M","N"];
    var arr3 = ["9","8","7","4","5","'","6","2","1","3","0","~","!","@","#","$","%","^","&","*","?","(",")","-","_",">","<"];
    var arr4 = ["R","S","T","U","O","P","'","Q","Z","A","B","V","W","X","Y","H","I","J","K","C","D","E","F","G","L","M","N"];
    var arr5 = ["5","'","9","8","7","4","6","2","#","$","%","^","&","1","3","0","~","!","@",")","-","_",">","<","*","?","("];
    var lett = 0;
//////////// تشفير /////////////////
    b1.onclick = function(){
        while (lett < in1.value.length){
            for (var i = 0 ; i < arr1.length; i++){
            if(in1.value[lett] == arr1[i]){
            in2.value += arr3[i] + arr2[i] + arr0[i] + arr4[i] + arr5[i];
            lett++;
            }
        }
    }
}
//////////// فك تشفير /////////////////
    b2.onclick = function(){
        while (lett < in1.value.length){
            for (var i = 0 ; i < arr3.length; i++){
            if(
                in1.value[lett] == arr3[i]
                &&
                in1.value[(lett+1)] == arr2[i]
                &&
                in1.value[(lett+2)] == arr0[i]
                &&
                in1.value[(lett+3)] == arr5[i]
                &&
                in1.value[(lett+4)] == arr4[i]
                )
            {
            in2.value += arr1[i];
            lett = lett + 5;
            }
        }
    }
}
// var arr6 = ["ا","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن","ه","و"]
</script>
</body>
</html>
