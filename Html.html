  <div class="heart" id="d1">
    <button onclick="clk()">اكبس هوون ولااااك</button></button>
  </div>
 
  <script>
  var x = document.getElementById("d1");
    function clk() {
x.style.animationName = "hello";
x.style.animationDuration = "1ms";
x.style.animationTimingFunction = "linear";
x.style.animationIterationCount = "infinite";
    }
  </script>
  <style>
    .heart{
      position: relative;
      margin: 200px auto;
      width: 200px;
      height: 290px;
      background: black;
      transform: rotate(45deg);
     /* animation: hello 4s linear infinite;*/
      border-radius: 200px 200px 0 0;
    }
    
    .heart::before{
      content: '';
      position: absolute;
      width: 200px;
      height: 290px;
      background: black;
      transform: rotate(-90deg);
      border-radius: 200px 200px 0 0;
      left: -45px;
      bottom: -45px;
    }
    
    @keyframes hello{
      0%{
        transform: rotate(0deg);
      }
      100%{
        transform: rotate(360deg);
    }
  </style>
</body>
